def props = new Properties()
def lp = rootProject.file("local.properties")
if (lp.exists()) {
    props.load(lp.newInputStream())
}
def hasSigning = props.containsKey("KEYSTORE_FILE") &&
        props.getProperty("KEYSTORE_FILE")?.trim()
println("load local sign config : $hasSigning")

android {
    namespace 'com.savet.local.ocr'
    compileSdk {
        version = release(36)
    }

    defaultConfig {
        applicationId "com.savet.local.ocr"
        minSdk 24
        targetSdk 36
        versionCode gitCommitNum()
        versionName "1." + releaseTime()
    }

    if(hasSigning) {
    signingConfigs {
        release {
            storeFile file(props.get("KEYSTORE_FILE"))
            storePassword props.get("KEYSTORE_PASSWORD")
            keyAlias props.get("KEY_ALIAS")
            keyPassword props.get("KEY_ALIAS_PASSWORD")
        }
    }
    }

    buildTypes {
        debug {
            if (hasSigning) {
                signingConfig signingConfigs.release
            }
        }
        release {
            if (hasSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_11
        targetCompatibility = JavaVersion.VERSION_11
    }
    kotlinOptions {
        jvmTarget = "11"
    }
    buildFeatures {
        viewBinding true
        buildConfig true
    }
    sourceSets {
        main {
            assets {
                srcDirs 'src/main/assets'
            }
        }
    }
}

